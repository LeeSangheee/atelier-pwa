<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2620"/>
      <stop offset="100%" stop-color="#0f0d0a"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.6  0 0 0 0 0.55  0 0 0 0 0.4  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 그레인 텍스처 -->
  <rect width="512" height="512" filter="url(#grain)"/>

  <!-- 외곽 프레임 -->
  <rect x="44" y="44" width="424" height="424" fill="none" stroke="#5a5240" stroke-width="1.5" opacity="0.6"/>

  <!-- 코너 마크 -->
  <g stroke="#a89060" stroke-width="2.5" fill="none" opacity="0.85">
    <path d="M 60 60 L 60 90 M 60 60 L 90 60"/>
    <path d="M 452 60 L 452 90 M 452 60 L 422 60"/>
    <path d="M 60 452 L 60 422 M 60 452 L 90 452"/>
    <path d="M 452 452 L 452 422 M 452 452 L 422 452"/>
  </g>

  <!-- 상단 라벨 -->
  <text x="256" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="22" letter-spacing="8" fill="#a89060" font-weight="500">EST · MMXXVI</text>

  <!-- 중앙 디바이더 위 -->
  <line x1="120" y1="170" x2="392" y2="170" stroke="#5a5240" stroke-width="1"/>

  <!-- 메인 모노그램 A -->
  <g transform="translate(256, 290)">
    <!-- 큰 세리프 A -->
    <text x="0" y="0" text-anchor="middle" font-family="'Times New Roman', Georgia, serif"
          font-size="280" font-weight="500" font-style="italic" fill="#ebe5d7" letter-spacing="-0.05em">A</text>
  </g>

  <!-- 중앙 디바이더 아래 -->
  <line x1="120" y1="362" x2="392" y2="362" stroke="#5a5240" stroke-width="1"/>

  <!-- 하단 라벨 -->
  <text x="256" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="22" letter-spacing="6" fill="#a89060" font-weight="600">ATELIER</text>
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="4" fill="#8b7d65" font-weight="400">STRENGTH JOURNAL</text>
</svg>
